services:

  rabbitmq:
    image: rabbitmq:4-management
    container_name: primecart-rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: 123

    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

    networks:
      - microservices-network

    restart: unless-stopped

volumes:
  rabbitmq-data:

networks:
  microservices-network:
    external: true