services:

  logstash:
    image: docker.elastic.co/logstash/logstash:8.18.3
    container_name: logstash

    environment:
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN}
    ports:
      - "5001:5000"

    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro

    networks:
      - primecart-nw

    restart: unless-stopped

networks:
  primecart-nw:
    external: true