processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64

  resource/customer:
    attributes:
      - key: service.name
        value: customer-service
        action: upsert
      - key: deployment.environment
        value: local
        action: upsert

  resource/product:
    attributes:
      - key: service.name
        value: product-service
        action: upsert
      - key: deployment.environment
        value: local
        action: upsert

  resource/api_gateway:
    attributes:
      - key: service.name
        value: api-gateway
        action: upsert
      - key: deployment.environment
        value: local
        action: upsert

  resource/cart:
    attributes:
      - key: service.name
        value: cart-service
        action: upsert
      - key: deployment.environment
        value: local
        action: upsert

  resource/inventory:
    attributes:
      - key: service.name
        value: inventory-service
        action: upsert
      - key: deployment.environment
        value: local
        action: upsert

  resource/order:
    attributes:
      - key: service.name
        value: order-service
        action: upsert
      - key: deployment.environment
        value: local
        action: upsert

  resource/payment:
    attributes:
      - key: service.name
        value: payment-service
        action: upsert
      - key: deployment.environment
        value: local
        action: upsert


  batch:
    timeout: 1s
    send_batch_size: 32

exporters:
  splunk_hec/customer:
    token: 8c953faa-8cac-4c32-8c9d-primecart-hec
    endpoint: http://primecart-splunk:8088/services/collector

    source: customer-service
    sourcetype: primecart:json
    index: main

    tls:
      insecure: true

    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m

    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 2000
  #      storage: file_storage

  splunk_hec/product:
    token: ${env:SPLUNK_HEC_TOKEN}
