receivers:
  file_log/customer:
    include:
      - /var/log/primecart/customer-service.json
    start_at: end
    include_file_path: true
    include_file_name: true
    poll_interval: 200ms
    storage: file_storage
    operators:
      - type: json_parser
        parse_from: body
        timestamp:
          parse_from: attributes["@timestamp"]
          layout_type: gotime
          layout: "2006-01-02T15:04:05.999999999Z07:00"

