extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  file_storage:
    directory: /var/lib/otelcol

service:
  extensions:
    - health_check
    - file_storage

  telemetry:
    logs:
      level: info

  pipelines:
    logs/customer:
      receivers:
        - file_log/customer
      processors:
        - memory_limiter
        - resource/customer
        - batch
      exporters:
        - splunk_hec/customer

    logs/product:
      receivers:
        - file_log/product
      processors:
        - memory_limiter
        - resource/product
        - batch
      exporters:
        - splunk_hec/product

    logs/api_gateway:
      receivers:
        - file_log/api_gateway
      processors:
        - memory_limiter
        - resource/api_gateway
        - batch
      exporters:
        - splunk_hec/api_gateway

    logs/cart:
      receivers:
        - file_log/cart
      processors:
        - memory_limiter
        - resource/cart
        - batch
      exporters:
        - splunk_hec/cart

    logs/inventory:
      receivers:
        - file_log/inventory
      processors:
        - memory_limiter
        - resource/inventory
        - batch
      exporters:
        - splunk_hec/inventory

    logs/order:
      receivers:
        - file_log/order
      processors:
        - memory_limiter
        - resource/order
        - batch
      exporters:
        - splunk_hec/order

    logs/payment:
      receivers:
        - file_log/payment
      processors:
        - memory_limiter
        - resource/payment
        - batch
      exporters:
        - splunk_hec/payment
