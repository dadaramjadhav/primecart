version: "3.8"

services:
  redis:
    image: redis:8.2-alpine
    container_name: redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped

    ports:
      - "5540:5540"

    depends_on:
      - redis

volumes:
  redis_data: