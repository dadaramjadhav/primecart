server:
  http_listen_port: 3200
  http_listen_address: 0.0.0.0
  grpc_listen_port: 9095
  grpc_listen_address: 0.0.0.0

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
 
storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h