version: "3.9"

services:

  api-gateway:
    image: dadaramjadhav/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8181:8181"
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    networks:
      - microservices-network

  product-service:
    image: dadaramjadhav/product-service:latest
    container_name: product-service
    ports:
      - "8081:8081"
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    networks:
      - microservices-network

  order-service:
    image: dadaramjadhav/order-service:latest
    container_name: order-service
    ports:
      - "8082:8082"
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    networks:
      - microservices-network

  cart-service:
    image: dadaramjadhav/cart-service:latest
    container_name: cart-service
    ports:
      - "8083:8083"
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    networks:
      - microservices-network

  inventory-service:
    image: dadaramjadhav/inventory-service:latest
    container_name: inventory-service
    ports:
      - "8084:8084"
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    networks:
      - microservices-network

  payment-service:
    image: dadaramjadhav/payment-service:latest
    container_name: payment-service
    ports:
      - "8085:8085"
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    networks:
      - microservices-network

networks:
  microservices-network:
    external: true