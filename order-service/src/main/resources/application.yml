server:
  port: 8082

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:mysql://localhost:3306/orderdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: Admin@12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    # properties:
    #   hibernate:
    #     format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/primecart

  cloud:
    openfeign:
      micrometer:
        enabled: true

management:
  endpoint:
    health:
      show-details: always

  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  tracing:
    enabled: true
    sampling:
      probability: 1.0
  prometheus:
    metrics:
      export:
        enabled: true

  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

info:
  app:
    name: Order Service
    description: PrimeCart Order Microservice
    version: 1.0.0

logging:
  level:
    root: INFO
    com.primecart: DEBUG
    org.springframework.web: INFO
#    org.hibernate.SQL: DEBUG
#    org.hibernate.orm.jdbc.bind: TRACE
#    org.springframework.security: DEBUG