spring:
  application:
    name: order-service
  config:
    import: configserver:http://localhost:8888

  cloud:
    config:
      label: main

management:
  endpoints:
    web:
      exposure:
        include:
          - circuitbreakers
          - circuitbreakerevents

  health:
    circuitbreakers:
      enabled: true

logging:
  level:
    io.github.resilience4j.retry: DEBUG
    com.primecart.service.InventoryIntegrationService: DEBUG