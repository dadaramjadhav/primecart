server:
  port: 8082

spring:
  application:
    name: order-service

  boot:
    admin:
      client:
        url: http://localhost:9191

  datasource:
    url: jdbc:mysql://localhost:3306/orderdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: Admin@12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    # properties:
    #   hibernate:
    #     format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/primecart

  cloud:
    openfeign:
      micrometer:
        enabled: true
      client:
        config:
          inventory-service:
            connect-timeout: 2000
            read-timeout: 3000
management:
  endpoint:
    health:
      show-details: always

  endpoints:
    web:
      exposure:
        include:
          - "*"
          - health
          - info
          - prometheus
          - circuitbreakers
          - circuitbreakerevents
  #        include: health,info,metrics,prometheus,caches
  health:
    circuitbreakers:
      enabled: true

  tracing:
    enabled: true
    sampling:
      probability: 1.0
  prometheus:
    metrics:
      export:
        enabled: true

  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

info:
  app:
    name: Order Service
    description: PrimeCart Order Microservice
    version: 1.0.0

logging:
  level:
    root: INFO
    com.primecart: DEBUG
    org.springframework.web: INFO
    io.github.resilience4j.retry: DEBUG
    com.primecart.service.InventoryIntegrationService: DEBUG
#    org.hibernate.SQL: DEBUG
#    org.hibernate.orm.jdbc.bind: TRACE
#    org.springframework.security: DEBUG
#==============================resilience4j configuration===============================
resilience4j:
  retry:
    instances:
      inventoryService:
        max-attempts: 3
        wait-duration: 10s
        #        enable-exponential-backoff: true
        #        exponential-backoff-multiplier: 2
        retry-exceptions:
          - feign.RetryableException
          - java.net.ConnectException
          - java.net.SocketTimeoutException
        ignore-exceptions:
          - com.primecart.exception.InventoryReservationException

  circuitbreaker:
    instances:
      inventoryService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true

  bulkhead:
    instances:
      inventoryService:
        max-concurrent-calls: 2
        max-wait-duration: 0