server:
  port: 8086

primecart:
  security:
    jwt:
      audience: primecart-api

spring:
  application:
    name: customer-service

  boot:
    admin:
      client:
        url: http://localhost:9191
        username: admin
        password: 123

  datasource:
    url: jdbc:mysql://localhost:3306/customer_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: Admin@12345

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://localhost:8443/realms/primecart

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches

  endpoint:
    health:
      show-details: when-authorized

  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0

  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
info:
  app:
    name: Customer Service
    description: PrimeCart Customer Microservice
    version: 1.0.0

logging:
  level:
    org.springframework.security: INFO
#    org.hibernate.SQL: DEBUG