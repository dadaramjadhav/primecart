server:
  port: 8181

primecart:
  security:
    jwt:
      audience: primecart-api

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/primecart

  boot:
    admin:
      client:
        url: http://localhost:9191
        username: admin
        password: 123

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

          routes:
            - id: product-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/products/**,/api/categories/**,/api/brands/**

            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/orders/**

            - id: cart-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/cart/**

            - id: inventory-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/inventory/**

            - id: payment-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/payments/**

            - id: keycloak-token
              uri: http://localhost:8080
              predicates:
                - Path=/auth/token
              filters:
                - RewritePath=/auth/token, /realms/primecart/protocol/openid-connect/token

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    otlp:
      tracing:
        endpoint: http://localhost:4318/v1/traces
  observations:
    enable:
      spring:
        security: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,caches

  endpoint:
    health:
      show-details: when-authorized

  prometheus:
    metrics:
      export:
        enabled: true
