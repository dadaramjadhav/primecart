server:
  port: 8181
  ssl:
    enabled: true
    certificate: file:/Users/dadaramjadhav/primecart/infra/tls/localhost-cert.pem
    certificate-private-key: file:/Users/dadaramjadhav/primecart/infra/tls/localhost-key.pem

#  ssl:
#    enabled: true
#    certificate: ${TLS_CERT_PATH}
#    certificate-private-key: ${TLS_KEY_PATH}

primecart:
  security:
    jwt:
      audience: primecart-api

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://localhost:8443/realms/primecart

  boot:
    admin:
      client:
        url: http://localhost:9191
        username: admin
        password: 123

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "https://localhost:5173"
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

          routes:
            - id: product-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/products/**,/api/categories/**,/api/brands/**

            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/orders/**

            - id: cart-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/cart/**

            - id: inventory-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/inventory/**

            - id: payment-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/payments/**

            - id: customer-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/customers/**

            - id: keycloak-token
              uri: http://localhost:8080
              predicates:
                - Path=/auth/token
              filters:
                - RewritePath=/auth/token, /realms/primecart/protocol/openid-connect/token

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    otlp:
      tracing:
        endpoint: http://localhost:4318/v1/traces
  observations:
    enable:
      spring:
        security: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,caches

  endpoint:
    health:
      show-details: when-authorized

  prometheus:
    metrics:
      export:
        enabled: true


logging:
  level:
    root: INFO

    # PrimeCart application code
    com.primecart: DEBUG

    # Frameworks
    org.springframework: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO

    # Database
    org.hibernate: INFO
    org.hibernate.SQL: INFO
    com.zaxxer.hikari: INFO

    # Observability libraries
    io.micrometer: INFO
    io.opentelemetry: INFO