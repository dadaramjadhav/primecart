server:
  port: 8080

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8090/realms/primecart
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/products/**

            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/orders/**

            - id: cart-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/cart/**

            - id: inventory-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/inventory/**
            - id: payment-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/payments/**
                
            - id: keycloak-token
              uri: http://localhost:8090
              predicates:
                - Path=/auth/token
              filters:
                - RewritePath=/auth/token, /realms/primecart/protocol/openid-connect/token

logging:
  level:
    org.springframework.security: TRACE
    org.springframework.security.oauth2: TRACE