server:
  port: 8084


spring:
  application:
    name: inventory-service

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: 123
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 1s
          multiplier: 2
          max-interval: 10s
          max-attempts: 3
        default-requeue-rejected: false

  boot:
    admin:
      client:
        url: http://localhost:9191

  datasource:
    url: jdbc:mysql://localhost:3306/inventory_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: Admin@12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
  #    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/primecart

management:
  endpoint:
    health:
      show-details: always

  endpoints:
    web:
      exposure:
        include: "*"
  #        include: health,info,metrics,prometheus,caches

  tracing:
    enabled: true
    sampling:
      probability: 1.0
  prometheus:
    metrics:
      export:
        enabled: true

  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

info:
  app:
    name: Cart Service
    description: PrimeCart Cart Microservice
    version: 1.0.0

logging:
  level:
    org.springframework.security: INFO
#    org.hibernate.SQL: DEBUG