server:
  port: 8084

primecart:
  security:
    jwt:
      audience: primecart-api

spring:
  application:
    name: inventory-service

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: 123
    listener:
      simple:
        concurrency: 2
        max-concurrency: 5
        prefetch: 10
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2
          max-interval: 10000ms
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true


  boot:
    admin:
      client:
        url: http://localhost:9191
        username: admin
        password: 123

  datasource:
    url: jdbc:mysql://localhost:3306/inventory_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: Admin@12345
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      pool-name: InventoryHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
  #    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/primecart

management:
  endpoint:
    health:
      show-details: when-authorized

  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches

  tracing:
    enabled: true
    sampling:
      probability: 1.0
  prometheus:
    metrics:
      export:
        enabled: true

  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

info:
  app:
    name: Inventory Service
    description: PrimeCart inventory Microservice
    version: 1.0.0

logging:
  level:
    org.springframework.security: INFO
#    org.hibernate.SQL: DEBUG